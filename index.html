<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SUCCULENT</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SUCCULENT">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#08100a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  background:#08100a;
  width:100%;height:100%;
  overflow:hidden;
  touch-action:none;
}
body{
  display:flex;align-items:center;justify-content:center;
  height:100vh;height:100dvh;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;}
</style>
</head>
<body>
<canvas id="cv" width="180" height="320"></canvas>
<input id="hiddenInput" type="text" maxlength="8"
  autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
  style="position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;top:0;left:0;">
<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;
function resize(){
  // safe-area-insetを考慮してキャンバスをフィット
  const vw=window.visualViewport?window.visualViewport.width:window.innerWidth;
  const vh=window.visualViewport?window.visualViewport.height:window.innerHeight;
  const s=Math.min(vw/180,vh/320);
  cv.style.width=(180*s)+'px';cv.style.height=(320*s)+'px';
}
resize();
window.addEventListener('resize',resize);
if(window.visualViewport)window.visualViewport.addEventListener('resize',resize);
// スクロール・バウンスを防ぐ
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
</script>
<script src="sprites.js"></script>
<script src="particles.js"></script>
<script src="state.js"></script>
<script src="render.js"></script>
<script src="main.js"></script>
</body>
</html>
