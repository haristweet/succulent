<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SUCCULENT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08100a;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;}
</style>
</head>
<body>
<canvas id="cv" width="180" height="320"></canvas>
<input id="hiddenInput" type="text" maxlength="8"
  autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
  style="position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;top:0;left:0;">
<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;
function resize(){
  const s=Math.min(window.innerWidth/180,window.innerHeight/320);
  cv.style.width=(180*s)+'px';cv.style.height=(320*s)+'px';
}
resize();window.addEventListener('resize',resize);
</script>
<script src="sprites.js"></script>
<script src="particles.js"></script>
<script src="state.js"></script>
<script src="render.js"></script>
<script src="main.js"></script>
</body>
</html>
